<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For You ❤️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <audio id="bgMusic" loop>
    <source src="assets/audio/music.mp3" type="audio/mpeg" />
  </audio>

  <div class="hearts" aria-hidden="true">
    <span>❤</span><span>❤</span><span>❤</span><span>❤</span>
    <span>❤</span><span>❤</span><span>❤</span><span>❤</span>
    <span>❤</span><span>❤</span>
  </div>
  <div class="sparkles" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span><span></span>
  </div>

  <section id="page1" class="page active page1">
    <p class="click-text">click here</p>
    <img class="hero" src="assets/gifs/main.gif" alt="Valentine GIF" />
    <img class="sticker page1-sticker-a" src="assets/stickers/heart1.png" alt="heart" />
    <img class="sticker page1-sticker-b" src="assets/stickers/hearts.png" alt="hearts" />
    <button id="openBtn" class="main-btn">OPEN</button>
  </section>

  <section id="page2" class="page page2">
    <img class="background-photo" src="assets/photos/background.jpeg" alt="Background" />
    <div class="background-overlay"></div>

    <img class="sticker page2-sticker-a" src="assets/stickers/bear.png" alt="bear" />
    <img class="sticker page2-sticker-b" src="assets/stickers/loveletter.png" alt="letter sticker" />

    <div class="letter-card">
      <h1>Happy Monthsary</h1>
      <p id="typeText"></p>
      <button id="nextBtn" class="main-btn secondary">Next ❤️</button>
    </div>
  </section>

  <section id="page3" class="page page3">
    <img class="sticker page3-sticker-a" src="assets/stickers/couple.png" alt="couple" />
    <img class="sticker page3-sticker-b" src="assets/stickers/heart2.png" alt="heart" />
    <img class="sticker page3-sticker-c" src="assets/stickers/heart3.png" alt="heart" />

    <div class="photo-layout">
      <img class="photo side side-1" src="assets/photos/photo1.jpeg" alt="Photo 1" />
      <img class="photo side side-2" src="assets/photos/photo2.jpeg" alt="Photo 2" />
      <img class="photo center-photo" src="assets/photos/photo5.jpeg" alt="Main Photo" />
      <img class="photo side side-3" src="assets/photos/photo3.jpeg" alt="Photo 3" />
      <img class="photo side side-4" src="assets/photos/photo4.jpeg" alt="Photo 4" />
      <div class="love-overlay">LOVE YOU</div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
